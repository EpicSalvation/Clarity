<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Slide outline -->
  <rect x="2" y="4" width="20" height="15" rx="1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title line (full-width, near top) -->
  <line x1="4" y1="8.5" x2="20" y2="8.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Body lines (full-width, below) -->
  <line x1="4" y1="12.5" x2="20" y2="12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="15.5" x2="16" y2="15.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
