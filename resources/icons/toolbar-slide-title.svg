<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Slide outline -->
  <rect x="2" y="4" width="20" height="15" rx="1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title line (large, centered, upper area) -->
  <line x1="5" y1="10" x2="19" y2="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Subtitle line (smaller, centered below) -->
  <line x1="8" y1="14" x2="16" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
</svg>
