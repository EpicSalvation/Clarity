<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="crystalLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <linearGradient id="crystalRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="crystalCenter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="50%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
    <linearGradient id="beam1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Incoming light beam -->
  <polygon points="60,100 80,110 200,175 200,165" fill="#fde68a" opacity="0.7"/>
  
  <!-- Refracted light beams (rainbow-like, simplified) -->
  <g opacity="0.6">
    <!-- Violet/blue -->
    <polygon points="200,185 340,120 335,110 200,175" fill="#818cf8"/>
    <!-- Blue -->
    <polygon points="200,190 350,145 345,135 200,180" fill="#38bdf8"/>
    <!-- Green -->
    <polygon points="200,195 355,175 350,165 200,185" fill="#4ade80"/>
    <!-- Yellow -->
    <polygon points="200,200 355,205 350,195 200,190" fill="#fde047"/>
    <!-- Orange -->
    <polygon points="200,205 350,235 345,225 200,195" fill="#fb923c"/>
    <!-- Red -->
    <polygon points="200,210 340,260 335,250 200,200" fill="#f87171"/>
  </g>
  
  <!-- Crystal/Prism -->
  <!-- Left face -->
  <polygon points="200,80 130,200 200,280" fill="url(#crystalLeft)" stroke="#0ea5e9" stroke-width="2"/>
  
  <!-- Right face -->
  <polygon points="200,80 270,200 200,280" fill="url(#crystalRight)" stroke="#0ea5e9" stroke-width="2"/>
  
  <!-- Center highlight -->
  <polygon points="200,90 175,200 200,270 225,200" fill="url(#crystalCenter)" opacity="0.7"/>
  
  <!-- Edge highlights -->
  <line x1="200" y1="80" x2="200" y2="280" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <line x1="200" y1="80" x2="130" y2="200" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="80" x2="270" y2="200" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  
  <!-- Sparkle accents -->
  <g fill="#ffffff">
    <circle cx="200" cy="100" r="4"/>
    <circle cx="180" cy="150" r="2"/>
    <circle cx="225" cy="140" r="2"/>
    <circle cx="200" cy="200" r="3" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#0369a1">Clarity</text>
</svg>
